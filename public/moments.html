<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>同学点滴 — 2509班</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700;900&family=Noto+Sans+SC:wght@300;400;500;700&family=Ma+Shan+Zheng&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <!-- Navigation -->
  <nav class="nav scrolled" id="nav">
    <div class="nav-inner">
      <a href="index.html" class="nav-brand">
        <span class="nav-brand-icon">玖</span>
        <span class="nav-brand-text">2509</span>
      </a>
      <ul class="nav-links">
        <li class="nav-back-link"><a href="index.html">← 返回首页</a></li>
        <li><a href="forum.html">交流区</a></li>
        <li><a href="moments.html" class="active">同学点滴</a></li>
        <li><a href="#" id="navLoginBtn" class="nav-login-link">登录</a></li>
      </ul>
      <button class="nav-toggle" id="navToggle" aria-label="菜单">
        <span></span><span></span><span></span>
      </button>
    </div>
  </nav>

  <!-- Moments Section -->
  <section class="section" id="momentsPage" style="padding-top:7rem;min-height:100vh">
    <div class="section-inner" style="max-width:900px">
      <div class="section-header reveal">
        <span class="section-number">点滴</span>
        <h2 class="section-title">同学点滴</h2>
        <p class="section-subtitle">记录我们一起走过的日子</p>
      </div>

      <!-- Publisher (仅管理员可见) -->
      <div class="forum-composer" id="momentsComposer" style="margin-bottom:2rem;display:none">
        <h3 class="composer-title">上传照片</h3>
        <div class="composer-fields">
          <textarea id="momentContent" class="composer-textarea" rows="2" placeholder="给这张照片配一段文字..."></textarea>
          <div style="display:flex;align-items:center;gap:0.5rem;margin-top:0.25rem">
            <label for="momentImage" style="cursor:pointer;display:flex;align-items:center;gap:0.3rem;font-size:0.85rem;color:var(--text-muted);padding:0.4rem 0.8rem;border:1px dashed var(--border);border-radius:6px">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="M21 15l-5-5L5 21"/></svg>
              选择照片
            </label>
            <input type="file" id="momentImage" accept="image/*" multiple style="display:none">
            <span id="momentPreview" style="font-size:0.8rem;color:var(--accent);display:none"></span>
            <button type="button" id="clearMomentImage" style="display:none;background:none;border:none;color:var(--text-muted);cursor:pointer;font-size:0.8rem">✕</button>
          </div>
          <button id="submitMoment" class="btn btn-primary" style="margin-top:0.5rem">发布</button>
        </div>
      </div>

      <!-- Timeline -->
      <div id="momentsTimeline"></div>
    </div>
  </section>

  <!-- Auth Modal -->
  <div class="modal-overlay" id="authModal" style="display:none">
    <div class="modal" style="max-width:420px">
      <button class="modal-close" id="closeAuthModal">&times;</button>
      <div class="modal-content" style="text-align:center">
        <h2 class="modal-post-title" style="margin-bottom:1.5rem" id="authTitle">登录</h2>
        <div id="authForm">
          <input type="text" id="authUsername" class="composer-input composer-input--full" style="margin-bottom:0.75rem" placeholder="设置账号（姓名小写拼音，如 zhangwei，否则无法注册）">
          <input type="text" id="authDisplayName" class="composer-input composer-input--full" style="margin-bottom:0.75rem;display:none" placeholder="真实姓名（须是本人真名且为2509班成员）">
          <input type="password" id="authPassword" class="composer-input composer-input--full" style="margin-bottom:1rem" placeholder="密码">
          <p id="authHint" style="color:var(--text-muted);font-size:0.75rem;margin-bottom:0.75rem;display:none">注册后你的账号就是 <strong id="authHintName"></strong>@2509</p>
          <p id="authError" style="color:#e53e3e;font-size:0.85rem;margin-bottom:0.75rem;display:none"></p>
          <button id="authSubmitBtn" class="btn btn-primary" style="width:100%">登录</button>
          <p style="margin-top:1rem;font-size:0.85rem;color:var(--text-muted)">
            <span id="authSwitchText">还没有账号？</span>
            <a href="#" id="authSwitchLink" style="color:var(--accent);text-decoration:none">注册</a>
          </p>
        </div>
        <div id="authUserInfo" style="display:none">
          <p style="margin-bottom:0.5rem">已登录：<strong id="authUserName"></strong></p>
          <p style="font-size:0.8rem;color:var(--text-muted);margin-bottom:1rem"><span id="authUserRole"></span></p>
          <button id="authLogoutBtn" class="btn btn-primary" style="width:100%;background:var(--ink)">退出登录</button>
        </div>
      </div>
    </div>
  </div>

  <!-- Footer -->
  <footer class="footer">
    <div class="footer-inner">
      <div class="footer-brand"><span class="footer-icon">玖</span><span>2509班 · 汤阴县高级中学</span></div>
      <p class="footer-motto">青春不散场，未来皆可期</p>
    </div>
  </footer>

  <script src="js/auth.js"></script>
  <script src="js/moments.js"></script>
</body>
</html>
